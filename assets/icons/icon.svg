    L 120 330
    C 117 348 104 358 90 364
    L 422 364
    C 408 358 395 348 392 330
    L 378 228
    C 372 150 334 88 256 88 Z
  " fill="white"/>

  <!-- Bell bottom flare / rim -->
  <rect x="88" y="356" width="336" height="22" rx="11" fill="white"/>

  <!-- Bell top mount -->
  <rect x="238" y="60" width="36" height="34" rx="10" fill="white"/>

  <!-- Bell clapper -->
  <circle cx="256" cy="400" r="24" fill="white"/>

  <!-- MR text -->
  <text
    x="256" y="478"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="68"
    font-weight="900"
    letter-spacing="6"
