name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggers on git tag like v1.0.0, v1.2.3
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icons

      - name: Build
        run: npm run build

      - name: Package Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetRemind-Windows
          path: dist-electron/*.exe
          retention-days: 7

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icons

      - name: Generate icon.icns (using macOS native iconutil)
        run: |
          mkdir -p MeetRemind.iconset
          sips -z 16   16   assets/icons/icon.png --out MeetRemind.iconset/icon_16x16.png
          sips -z 32   32   assets/icons/icon.png --out MeetRemind.iconset/icon_16x16@2x.png
          sips -z 32   32   assets/icons/icon.png --out MeetRemind.iconset/icon_32x32.png
          sips -z 64   64   assets/icons/icon.png --out MeetRemind.iconset/icon_32x32@2x.png
          sips -z 128  128  assets/icons/icon.png --out MeetRemind.iconset/icon_128x128.png
          sips -z 256  256  assets/icons/icon.png --out MeetRemind.iconset/icon_128x128@2x.png
          sips -z 256  256  assets/icons/icon.png --out MeetRemind.iconset/icon_256x256.png
          sips -z 512  512  assets/icons/icon.png --out MeetRemind.iconset/icon_256x256@2x.png
          sips -z 512  512  assets/icons/icon.png --out MeetRemind.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icons/icon.png --out MeetRemind.iconset/icon_512x512@2x.png
          iconutil -c icns MeetRemind.iconset -o assets/icons/icon.icns
          rm -rf MeetRemind.iconset

      - name: Build
        run: npm run build

      - name: Package macOS DMG
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment and add secrets for code signing + notarization:
          # CSC_LINK: ${{ secrets.MAC_CERTS }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetRemind-macOS
          path: dist-electron/*.dmg
          retention-days: 7

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: MeetRemind-Windows
          path: release/

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: MeetRemind-macOS
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
